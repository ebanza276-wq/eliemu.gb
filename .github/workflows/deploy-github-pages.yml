name: Web Build + Deployment to GitHub Pages

on:
push:
branches:
- master
- main

pull_request:
branches:
- master
- main

workflow_dispatch:

concurrency:
group: "pages"
cancel-in-progress: false

env:
BUILD_NUMBER: 1
BUILD_VERSION: 1.0.0
PYTHON_VERSION: "3.12"
FLUTTER_VERSION: "3.41.7"

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install flet==0.85.3

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: ${{ env.FLUTTER_VERSION }}
      cache: true

  - name: Verify versions
    run: |
      python --version
      flutter --version
      flet --version

  - name: Disable Flutter analytics
    run: flutter config --no-analytics

  - name: Build web app
    run: |
      echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}"
      echo "USER: ${GITHUB_REPOSITORY%/*}"
      echo "PROJECT_BASE_URL: ${GITHUB_REPOSITORY#*/}"

      flet build web \
        --base-url ${GITHUB_REPOSITORY#*/} \
        --route-url-strategy hash

  - name: Upload artifact
    uses: actions/upload-pages-artifact@v3
    with:
      name: web-build-artifact
      path: build/web
```

deploy:
if: github.event_name == 'push'
needs: build

```
runs-on: ubuntu-latest

permissions:
  pages: write
  id-token: write

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

steps:
  - name: Setup Pages
    uses: actions/configure-pages@v5

  - name: Deploy to GitHub Pages
    id: deployment
    uses: actions/deploy-pages@v4
    with:
      artifact_name: web-build-artifact
```
